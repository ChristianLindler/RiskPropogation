<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Propogation Notification Demo</title>
  <style>
    :root {
      --bg-base: #0a0e14;
      --bg-panel: #0e131b;
      --bg-elevated: #161b24;
      --border-subtle: rgba(139, 148, 158, 0.12);
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-low: #3fb950;
      --accent-med: #d29922;
      --accent-high: #e5604a;
      --chip-border: rgba(63, 185, 80, 0.30);
      --chip-text: #7ee787;
      --accent-teal: #3dd6c3;
      --font-body: system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
      z-index: 100;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
    }

    .notif-wrap {
      position: relative;
    }

    .notif-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .notif-btn:hover,
    .notif-btn.open {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border-color: rgba(139, 148, 158, 0.25);
    }

    .notif-btn.has-unread {
      color: var(--accent-high);
      border-color: rgba(229, 96, 74, 0.35);
    }

    .notif-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      background: var(--accent-high);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 999px;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .notif-badge.visible { display: flex; }

    .notif-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 380px;
      max-height: 420px;
      overflow-y: auto;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      display: none;
    }

    .notif-panel.open { display: block; }

    .notif-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .notif-clear {
      background: none;
      border: none;
      color: var(--accent-teal);
      font-size: 11px;
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
    }

    .notif-clear:hover { text-decoration: underline; }

    .notif-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .notif-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.12s;
    }

    .notif-item:hover { background: rgba(255, 255, 255, 0.03); }
    .notif-item.unread { background: rgba(229, 96, 74, 0.05); }

    .notif-item-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .notif-item-title .delta {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-high);
    }

    .notif-item-change {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .notif-item-why {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .notif-item-meta {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex: 1;
      min-height: 0;
    }

    .sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border-subtle);
      padding: 28px 0;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 0 24px 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--accent-teal);
      text-transform: uppercase;
    }

    .wl-nav { list-style: none; }

    .wl-nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 24px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      border-left: 3px solid transparent;
      transition: background 0.15s, color 0.15s;
    }

    .wl-nav-item .wl-name {
      flex: 1;
      line-height: 1.35;
    }

    .wl-alert-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-high);
      flex-shrink: 0;
      display: none;
      box-shadow: 0 0 0 0 rgba(229, 96, 74, 0.5);
    }

    .wl-nav-item.has-unseen .wl-alert-dot {
      display: block;
      animation: wl-pulse 2s ease-in-out infinite;
    }

    @keyframes wl-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229, 96, 74, 0.45); }
      50% { box-shadow: 0 0 0 4px rgba(229, 96, 74, 0); }
    }

    .wl-nav-item:hover {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .wl-nav-item.active {
      background: rgba(229, 96, 74, 0.12);
      border-left-color: var(--accent-high);
      color: var(--accent-high);
    }

    .wl-nav-item.has-unseen:not(.active) {
      color: var(--text-primary);
      font-weight: 500;
    }

    .main {
      padding: 44px 52px;
      background:
        linear-gradient(rgba(61, 214, 195, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61, 214, 195, 0.03) 1px, transparent 1px),
        var(--bg-base);
      background-size: 32px 32px;
      overflow-y: auto;
    }

    .detail-title-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .detail-title {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .entity-count-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border: 1px solid var(--chip-border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--chip-text);
    }

    .band-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-low);
    }

    .band-dot.low { background: var(--accent-low); }
    .band-dot.medium { background: var(--accent-med); }
    .band-dot.high { background: var(--accent-high); }

    .detail-desc {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.55;
      max-width: 680px;
      margin-bottom: 20px;
    }

    .entity-rows {
      border-top: 1px solid var(--border-subtle);
      max-width: 800px;
      margin-bottom: 32px;
    }

    .entity-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.15s;
    }

    .entity-row.flash {
      animation: row-flash 2s ease-out;
    }

    @keyframes row-flash {
      0% { background: rgba(229, 96, 74, 0.18); }
      100% { background: transparent; }
    }

    .entity-row .name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
    }

    .entity-row .meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 16px;
    }

    .entity-row .score {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 52px;
      justify-content: flex-end;
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent-teal);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .muted { color: var(--text-muted); }
    .empty-state { color: var(--text-muted); font-size: 14px; }
    .hint { margin-top: 8px; color: var(--text-secondary); line-height: 1.6; }
  </style>
</head>
<body>
  <header class="top-header">
    <span class="logo">Risk Propogation Notification Demo</span>
    <div class="header-right">
      <div class="notif-wrap">
        <button id="notif-btn" class="notif-btn" aria-label="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span id="notif-badge" class="notif-badge">0</span>
        </button>
        <div id="notif-panel" class="notif-panel">
          <div class="notif-panel-header">
            <span>Alerts</span>
            <button id="notif-clear" class="notif-clear">Clear all</button>
          </div>
          <div id="notif-list"></div>
        </div>
      </div>
    </div>
  </header>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">Active Watchlists</div>
      <ul id="wl-nav" class="wl-nav"></ul>
    </aside>
    <main class="main" id="main-panel">
      <div class="empty-state">Loading…</div>
    </main>
  </div>

  <script src="app.js?v=13"></script>
</body>
</html>
